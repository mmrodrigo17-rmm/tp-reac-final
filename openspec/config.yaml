# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: React 19 + Vite 8 + React Router 7
  Architecture: SPA con contexto global (AuthContext, CartContext), layout jerárquico (Layout > Nav/Footer/Outlet), patrón container/presentacional incipiente (ItemListContainer, ItemDetailContainer)
  Testing: No test runner detectado — strict_tdd: false
  Style: JSX plano (sin TypeScript), ESLint 10 con flat config, sin formateador dedicado

rules:
  proposal:
    - Incluir plan de rollback para cambios riesgosos
  specs:
    - Usar Given/When/Then para escenarios
    - Usar palabras clave RFC 2119 (MUST, SHALL, SHOULD, MAY)
  design:
    - Incluir diagramas de secuencia para flujos complejos
    - Documentar decisiones de arquitectura con fundamento
  tasks:
    - Agrupar por fase, usar numeración jerárquica
    - Mantener tareas completables en una sesión
  apply:
    - Seguir patrones de código existentes
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: "npm run build"
    coverage_threshold: 0
  archive:
    - Avisar antes de mergear deltas destructivos

testing:
  test_runner: null
  test_layers:
    unit: false
    integration: false
    e2e: false
  coverage: false
  linter: true
  linter_command: "npm run lint"
  type_checker: false
  formatter: false
  strict_tdd: false
  note: "No se detectó test runner. Las dependencias de testing deben agregarse explícitamente. strict_tdd se estableció en false."
